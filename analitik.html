<html lang="id">

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <aside class="sidebar">
        <div class="profile-section">
            <div class="profile-icon">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <h3>Alphard</h3>
            <span class="profile-role">Admin JoinSport</span>
        </div>
        <ul class="nav-menu">
            <a href="index.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-dashboard">
                <i class="fa-solid fa-house"></i> Dashboard
            </li></a>
            <a href="log-aktivitas.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-log">
                <i class="fa-solid fa-list-check"></i> Log Aktivitas
            </li></a>
            <a href="transaksi.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-transaksi">
                <i class="fa-solid fa-credit-card"></i> Transaksi
            </li></a>
            <a href="manajemen-event.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-manajemen">
                <i class="fa-solid fa-calendar-days"></i> Manajemen Event
            </li></a>
            <a href="analitik.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-analitik" class="nav-item active">

            </li></a>
        </ul>

    <main class="main-content">

        <section id="analitik" class="page-section active">
            <div class="page-header">
                <h2>Analitik dan Dampak Sistem Deposit</h2>
            </div>
            <div class="card impact-summary">
                <div><strong>Pembatalan:</strong> x:N, 80.000</div>
                <div class="health-indicator">
                    System Health
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>
            </div>
            <div class="charts-row">
                <div class="card">
                    <h4 class="chart-title">Sebelum Sistem Deposit</h4>
                    <canvas id="chartSebelum"></canvas>
                </div>
                <div class="card">
                    <h4 class="chart-title">Setelah Sistem Deposit</h4>
                    <canvas id="chartSesudah"></canvas>
                </div>
            </div>
        </section>
