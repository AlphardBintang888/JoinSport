<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JoinSport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <aside class="sidebar">
        <div class="profile-section">
            <div class="profile-icon">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <h3>Alphard</h3>
            <span class="profile-role">Admin JoinSport</span>
        </div>
        <ul class="nav-menu">
            <a href="index.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-dashboard" class="nav-item active">
                <i class="fa-solid fa-house"></i> Dashboard
            </li></a>
            <a href="log-aktivitas.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-log">
                <i class="fa-solid fa-list-check"></i> Log Aktivitas
            </li></a>
            <a href="transaksi.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-transaksi">
                <i class="fa-solid fa-credit-card"></i> Transaksi
            </li></a>
            <a href="manajemen-event.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-manajemen">
                <i class="fa-solid fa-calendar-days"></i> Manajemen Event
            </li></a>
            <a href="analitik.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-analitik">
                <i class="fa-solid fa-chart-line"></i> Analitik
            </li></a>
        </ul>
    </aside>

    <main class="main-content">

        <section id="dashboard" class="page-section active">
            <div class="page-header">
                <h2>DASHBOARD UTAMA</h2>
                <div class="system-health">
                    <span>System Health <span class="status-good"><i class="fa-solid fa-heart-pulse"></i>
                            Baik</span></span>
                </div>
            </div>

            <div class="stats-grid" style="grid-template-columns: 1fr;">
                <div class="stat-card">
                    <div>
                        <h4 class="text-muted">Transaksi Pending</h4>
                        <h2>Sedang <span style="font-size: 0.5em; color: var(--text-muted);">(42)</span></h2>
                    </div>
                    <i class="fa-regular fa-clock icon-orange"></i>
                </div>
            </div>

            <div class="card">
                <h3>Real-time User Activity</h3>
                <div class="chart-container">
                    <canvas id="dashboardChart"></canvas>
                </div>
            </div>

            <div class="page-header" style="margin-top: 30px;">
                <h2>Event Sedang Berjalan</h2>
            </div>
            <div class="events-grid" id="dashEventsContainer" style="margin-bottom: 30px;">
                <!-- Event berjalan akan diinjeksi via JS -->
            </div>

            <div class="mini-stat-bar">
                <div class="mini-stat-info">
                    <i class="fa-solid fa-users icon-blue"></i>
                    <span><strong>Pengguna Online:</strong> 1,245 (Tinggi)</span>
                </div>
                <span class="status-good">Status Stabil</span>
            </div>
        </section>
