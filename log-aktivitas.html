<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JoinSport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <aside class="sidebar">
        <div class="profile-section">
            <div class="profile-icon">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <h3>Alphard</h3>
            <span class="profile-role">Admin JoinSport</span>
        </div>
        <ul class="nav-menu">
            <a href="index.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-dashboard">
                <i class="fa-solid fa-house"></i> Dashboard
            </li></a>
            <a href="log-aktivitas.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-log" class="nav-item active">
                <i class="fa-solid fa-list-check"></i> Log Aktivitas
            </li></a>
            <a href="transaksi.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-transaksi">
                <i class="fa-solid fa-credit-card"></i> Transaksi
            </li></a>
            <a href="manajemen-event.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-manajemen">
                <i class="fa-solid fa-calendar-days"></i> Manajemen Event
            </li></a>
            <a href="analitik.html" style="text-decoration:none; color:inherit;"><li class="nav-item" id="nav-analitik">
                <i class="fa-solid fa-chart-line"></i> Analitik
            </li></a>
        </ul>
    </aside>

    <main class="main-content">

        <section id="log-aktivitas" class="page-section active">
            <div class="page-header">
                <h2>HALAMAN LOG AKTIVITAS</h2>
            </div>
            <div class="card">
                <div class="filter-row">
                    <div>
                        Filter Status:
                        <select class="custom-select" id="logStatusFilter">
                            <option value="Semua">Semua</option>
                            <option value="Berhasil">Berhasil</option>
                            <option value="Warning">Warning</option>
                            <option value="Error">Error</option>
                        </select>
                    </div>
                    <div>
                        <button class="btn btn-muted" onclick="filterLogs()"><i class="fa-solid fa-filter"></i>
                            Filter</button>
                        <button class="btn btn-danger" onclick="clearLogs()"
                            style="background:var(--danger);color:white;margin-left:10px;"><i
                                class="fa-solid fa-trash"></i> Bersihkan Log</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Pengguna</th>
                            <th>Aktivitas / Aksi</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="activityLogList">
                        <!-- Injeksi JS -->
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>Catatan Investigasi Admin</h3>
                <textarea class="textarea-custom"
                    placeholder="Ketik catatan di sini...">User dirugikan akibat masalah pembayaran sistem</textarea>
            </div>
        </section>
